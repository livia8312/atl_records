<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Perfil do Atleta</title>
  <link rel="stylesheet" href="perfil.css">
</head>
<body>

  <header class="header">
    <div class="perfil">
      <img src="https://via.placeholder.com/80" class="foto">
      <div>
        <h2>Lívia Ávila</h2>
        <p>Atleta em evolução</p>
      </div>
    </div>
  </header>

  <main class="grid">

    <div class="card destaque">
      <div class="card-top">
        <h3>Meus Recordes</h3>
        <button class="add-btn" onclick="abrirModal()">+</button>
      </div>
      <p>Veja e adicione seus melhores tempos</p>
    </div>

    <div class="card">
      <h3>Próximos Eventos</h3>
      <p>Competições e treinos futuros</p>
    </div>

    <div class="card">
      <h3>Minhas Conquistas</h3>
      <p>Medalhas e objetivos alcançados</p>
    </div>

    <div class="card">
      <h3>Melhorias</h3>
      <p>Evolução e desempenho</p>
    </div>

  </main>

  <!-- MODAL -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <h2>Novo Recorde</h2>

      <label>Tipo</label>
      <select>
        <option>Corrida</option>
        <option>Salto</option>
        <option>Arremesso</option>
      </select>

      <label>Valor</label>
      <input type="text" placeholder="Ex: 12.5s ou 5.30m">

      <label>Data</label>
      <input type="date">

      <div class="botoes">
        <button class="salvar">Salvar</button>
        <button onclick="fecharModal()">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="perfil.js"></script>
</body>
</html>
