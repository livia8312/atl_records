<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Registros</title>
    <link rel="stylesheet" href="recordes.css">
    <script src="recordes.js" defer type="module"></script>
</head>
<body>

<header>
    <div class="top-bar"></div>

    <div class="header-content">
        <div class="left">
            <button class="back"><a href="../perfil2/perfil2.html">←</a></button>

            <div class="title-box">
                <div class="icon">🏆</div>
                <div>
                    <h1>Meus Registros</h1>
                    <p>
    <span id="totalRegistros">0</span> registros
</p>
                </div>
            </div>
        </div>

        <button id="abrirModal">+ Adicionar</button>
    </div>
</header>

<main>

    <section class="stats">

        <div class="card total">
            <p>🏆 Total</p>
            <h2>0</h2>
        </div>

        <div class="card corrida">
            <p>🏃corridas</p>
            <h2>0</h2>
        </div>

        <div class="card salto">
            <p>🤸 saltos</p>
            <h2>0</h2>
        </div>

        <div class="card arremesso">
            <p>🥏 arremessos</p>
            <h2>0</h2>
        </div>

    </section>
</main>
<!-- MODAL RECORDES -->
<div id="modalEvento">

    <div class="modal-content">

        <button id="fecharModal" class="fechar">✕</button>

        <h2>Adicionar registro</h2>

        <form>

            <label>Modalidade*</label>

            <select name="modalidade" id="idDoInputModalidade">
                <option value="">Modalidade</option>
                <option value="100">100m Rasos</option>
                <option value="200">200m Rasos</option>
                <option value="400">400m Rasos</option>
                <option value="800">800m</option>
                <option value="1500">1500m</option>
                <option value="altura">Salto em Altura</option>
                <option value="distancia">Salto em Distância</option>
                <option value="triplo">Salto Triplo</option>
                <option value="peso">Arremesso de Peso</option>
                <option value="disco">Arremesso de Disco</option>
                <option value="dardo">Arremesso de Dardo</option>
            </select>

            <div class="linha">

                <div>
                    <label>Resultado *</label>
                    <input type="number" name="resultado" id="idDoInputResultado">
                </div>

                <div>
                    <label>Data *</label>
                    <input type="date" name="data" id="idDoInputData">
                </div>

            </div>

            <div class="botoes-modal">

                <button  id="cancelar" type="button">Cancelar</button>

                <button id="publicar" type="submit">
                    Adicionar Registro
                </button>

            </div>

        </form>

    </div>

</div>


<div id="corridasList"></div>
<div id="saltosList"></div>
<div id="arremessosList"></div>
</body>
</html>
