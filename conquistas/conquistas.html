<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Conquistas</title>
    <link rel="stylesheet" href="conquistas.css">
    <script src="conquistas.js" type="module"></script>
</head>
<body>

<header>
    <div class="top-bar"></div>

    <div class="header-content">

        <div class="left">

            <button class="back"><a href="../perfil2/perfil2.html">←</a></button>

            <div class="title-box">

                <div class="icon">
                    🏅
                </div>

                <div>
                    <h1>Minhas Conquistas</h1>
                    <p>3 / 9 desbloqueadas</p>
                </div>

            </div>

        </div>

    </div>
</header>

<main>

    <section class="progresso-geral">

        <div class="info-progresso">

            <div>

                <h2>Progresso Geral</h2>

                <p>
                    Você está evoluindo muito bem!
                </p>

            </div>

            <h1 id="porcentagemConquistas">
                0%
            </h1>

        </div>

        <div class="barra">

            <div
                class="preenchimento"
                id="barraConquistas">

            </div>

        </div>

        <div class="niveis">

            <span class="bronze-tag">
                Bronze
            </span>

            <span class="prata-tag">
                Prata
            </span>

            <span class="ouro-tag">
                Ouro
            </span>

            <span class="diamante-tag">
                Diamante
            </span>

        </div>

    </section>
    <section class="conquistas" id="listaConquistas">

    </section>

</main>

</body>
</html>
