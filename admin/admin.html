<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Eventos</title>
    <link rel="stylesheet" href="admin.css">
    <script src="admin.js" defer></script>
</head>
<body>

    <main class="container">

        <div class="topo">
            <div>
                <h1>Gestão de Eventos</h1>
                <p>Crie, edite e organize os eventos esportivos da plataforma.</p>
            </div>

            <button id="abrirModal" class="btn-criar">
                ➕ Criar Novo Evento
            </button>
        </div>

        <section class="estatisticas">
            <div class="card azul">
                <h2 id="totalE">0</h2>
                <span>Total de Eventos</span>
            </div>

            <div class="card amarelo">
                <h2 id="totalC">0</h2>
                <span>Corridas</span>
            </div>

            <div class="card amarelo2">
                <h2 id="totalS">0</h2>
                <span>Saltos</span>
            </div>

            <div class="card roxo">
                <h2 id="totalA">0</h2>
                <span>Arremessos</span>
            </div>
        </section>

        <!-- Os cards serão criados pelo JS -->
        <section id="listaEventos">
            <div id="corridas"></div>
            <div id="saltos"></div>
            <div id="arremessos"></div>
        </section>
    </main>

    <!-- MODAL -->
    
    <div id="modalEvento" class="modal">
        <div class="modal-content">

            <button id="fecharModal" class="fechar">✕</button>

            <div class="titulo-modal">
                <div class="icone">📅</div>

                <div>
                    <h2>Criar Novo Evento</h2>
                    <p>Preencha os dados para publicar.</p>
                </div>
            </div>

            <form id="formEvento" class="form-modal">

                <label>Nome do Evento *</label>
                <input id="nomeEvento" type="text"
                    placeholder="Ex: Campeonato Estadual de Velocidade">

                <label>Categoria *</label>
                <select id="categoriaEvento">
                    <option value="" selected>Selecione a categoria</option>
                    <option id="corridas">Corridas</option>
                    <option id="saltos">Saltos</option>
                    <option id="arremessos">Arremessos</option>
                </select>

                <div class="linha">

                    <div>
                        <label>Data *</label>
                        <input id="dataEvento" type="date">
                    </div>

                    <div>
                        <label>Local *</label>
                        <input id="localEvento" type="text"
                            placeholder="Ex: Estádio Municipal, SP">
                    </div>

                </div>

                <label>Descrição</label>
                <textarea id="descricaoEvento" placeholder="Detalhes sobre o evento, regras, categorias de idade..."></textarea>

                <div class="botoes-modal">
                    <button type="button" id="cancelar">
                        Cancelar
                    </button>

                    <button type="submit" id="publicar">
                        Publicar Evento
                    </button>
                </div>

            </form>

        </div>
    </div>
</body>
</html>
