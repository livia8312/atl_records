<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="grafico.js"></script>
    <script type="module" src="melhorias.js" defer></script>
    <link rel="stylesheet" href="melhorias.css">
</head>
<body>
    <header>
    <div class="top-bar"></div>

    <div class="header-content">

        <div class="left">

            <a href="../perfil2/perfil2.html" class="back">←</a>

            <div class="title-box">

                <div class="icon melhorias-icon">
                    📈
                </div>

                <div>
                    <h1>Melhorias</h1>
                    <p>Evolução e estatísticas de progresso</p>
                </div>

            </div>

        </div>

    </div>
</header>
<section class="cards-melhorias">

    <div class="card-melhoria corrida">
        <div class="card-topo">
            <div>
                <h2>🏃 Corridas</h2>
                <p>Jan - Jun 2026</p>
            </div>

            <select>
                <option value="100">100m Rasos</option>
                <option value="200">200m Rasos</option>
                <option value="400">400m Rasos</option>
                <option value="800">800m</option>
                <option value="1500">1500m</option>
            </select>
        </div>

        <div class="estatisticas">
            <div class="stat">
                <span>Melhor</span>
                <h3>11.92s</h3>
            </div>

            <div class="stat">
                <span>Último</span>
                <h3>11.48s</h3>
            </div>

            <div class="stat">
                <span>Variação</span>
                <h3 class="verde">-0.44s</h3>
            </div>
        </div>

        <div class="grafico" id="corrida">
        </div>
    </div>

    <div class="card-melhoria arremesso">
        <div class="card-topo">
            <div>
                <h2>🥏 Arremessos</h2>
                <p>Jan – Jun 2026</p>
            </div>

            <select>
                <option value="peso">Arremesso de Peso</option>
                <option value="disco">Arremesso de Disco</option>
                <option value="dardo">Arremesso de Dardo</option>
            </select>
        </div>

        <div class="estatisticas">
            <div class="stat">
                <span>Melhor</span>
                <h3>15.08m</h3>
            </div>

            <div class="stat">
                <span>Último</span>
                <h3>14.85m</h3>
            </div>

            <div class="stat">
                <span>Variação</span>
                <h3 class="verde">+1.65m</h3>
            </div>
        </div>

        <div class="grafico" id="arremesso">
        </div>
    </div>

    <div class="card-melhoria salto">
        <div class="card-topo">
            <div>
                <h2>🤸 Saltos</h2>
                <p>Jan – Jun 2026</p>
            </div>

            <select>
                <option value="distancia">Salto em Distância</option>
                <option value="altura">Salto em altura</option>
                <option value="triplo">Salto em triplo</option>
            </select>
        </div>

        <div class="estatisticas">
            <div class="stat">
                <span>Melhor</span>
                <h3>6.32m</h3>
            </div>

            <div class="stat">
                <span>Último</span>
                <h3>6.25m</h3>
            </div>

            <div class="stat">
                <span>Variação</span>
                <h3 class="verde">+0.45m</h3>
            </div>
        </div>

        <div class="grafico" id="salto">
        </div>
    </div>

</section>
</body>
</html>
