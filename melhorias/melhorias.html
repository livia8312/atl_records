<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="melhorias.js" defer></script>
    <link rel="stylesheet" href="melhorias.css">
</head>
<body>
    <header>
    <div class="top-bar"></div>

    <div class="header-content">

        <div class="left">

            <button class="back">←</button>

            <div class="title-box">

                <div class="icon melhorias-icon">
                    📈
                </div>

                <div>
                    <h1>Melhorias</h1>
                    <p>Evolução e estatísticas de progresso</p>
                </div>

            </div>

        </div>

    </div>
</header>
<section class="cards-melhorias">

    <div class="card-melhoria corridas">
        <div class="card-topo">
            <div>
                <h2>🏃 Corridas</h2>
                <p>Jan – Jun 2026</p>
            </div>

            <select>
                <option>100m Rasos</option>
            </select>
        </div>

        <div class="estatisticas">
            <div class="stat">
                <span>Melhor</span>
                <h3>11.92s</h3>
            </div>

            <div class="stat">
                <span>Último</span>
                <h3>11.48s</h3>
            </div>

            <div class="stat">
                <span>Variação</span>
                <h3 class="verde">-0.44s</h3>
            </div>
        </div>

        <div class="grafico">
            <div class="linha"></div>
        </div>
    </div>

    <div class="card-melhoria arremessos">
        <div class="card-topo">
            <div>
                <h2>🥏 Arremessos</h2>
                <p>Jan – Jun 2026</p>
            </div>

            <select>
                <option>Arremesso de Peso</option>
            </select>
        </div>

        <div class="estatisticas">
            <div class="stat">
                <span>Melhor</span>
                <h3>15.08m</h3>
            </div>

            <div class="stat">
                <span>Último</span>
                <h3>14.85m</h3>
            </div>

            <div class="stat">
                <span>Variação</span>
                <h3 class="verde">+1.65m</h3>
            </div>
        </div>

        <div class="grafico">
            <div class="linha"></div>
        </div>
    </div>

    <div class="card-melhoria saltos">
        <div class="card-topo">
            <div>
                <h2>🤸 Saltos</h2>
                <p>Jan – Jun 2026</p>
            </div>

            <select>
                <option>Salto em Distância</option>
            </select>
        </div>

        <div class="estatisticas">
            <div class="stat">
                <span>Melhor</span>
                <h3>6.32m</h3>
            </div>

            <div class="stat">
                <span>Último</span>
                <h3>6.25m</h3>
            </div>

            <div class="stat">
                <span>Variação</span>
                <h3 class="verde">+0.45m</h3>
            </div>
        </div>

        <div class="grafico">
            <div class="linha"></div>
        </div>
    </div>

</section>
</body>
</html>
